<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Screenshot to Spec</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #222636;
      --border: #2e3248;
      --accent: #6c63ff;
      --accent-hover: #7d76ff;
      --text: #e8eaf6;
      --muted: #8b8fa8;
      --green: #4caf82;
      --red: #f4666a;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; display: flex; flex-direction: column; }

    header { padding: 16px 28px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; }

    .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 1.05rem; letter-spacing: -0.02em; flex-shrink: 0; }
    .logo-icon { width: 30px; height: 30px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 15px; }

    .header-controls { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
    .header-controls label { font-size: 0.78rem; color: var(--muted); white-space: nowrap; }

    .ctrl-input {
      background: var(--surface2); border: 1px solid var(--border); border-radius: 7px;
      color: var(--text); font-size: 0.82rem; padding: 6px 10px; outline: none; transition: border-color 0.2s;
    }
    .ctrl-input:focus { border-color: var(--accent); }
    select.ctrl-input { cursor: pointer; }

    #proxyInput { width: 200px; }
    #apiKeyInput { width: 220px; }

    .key-status { width: 7px; height: 7px; border-radius: 50%; background: var(--border); flex-shrink: 0; transition: background 0.2s; }
    .key-status.ok { background: var(--green); }

    main { flex: 1; display: grid; grid-template-columns: 1fr 1fr; height: calc(100vh - 61px); }

    .panel { padding: 24px; overflow-y: auto; }
    .panel-left { border-right: 1px solid var(--border); }

    .panel-title { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); margin-bottom: 14px; }

    .dropzone {
      border: 2px dashed var(--border); border-radius: 14px; padding: 40px 20px;
      text-align: center; cursor: pointer; transition: border-color 0.2s, background 0.2s;
      background: var(--surface); position: relative;
    }
    .dropzone:hover, .dropzone.drag-over { border-color: var(--accent); background: rgba(108,99,255,0.06); }
    .dropzone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
    .dropzone-icon { font-size: 2.2rem; margin-bottom: 10px; }
    .dropzone-text { font-size: 0.92rem; font-weight: 500; margin-bottom: 4px; }
    .dropzone-sub { font-size: 0.78rem; color: var(--muted); }

    .preview-wrap { margin-top: 16px; position: relative; }
    .preview-wrap img { width: 100%; border-radius: 10px; border: 1px solid var(--border); display: block; }
    .preview-clear { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); border: none; color: #fff; border-radius: 50%; width: 26px; height: 26px; cursor: pointer; font-size: 13px; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    .preview-clear:hover { background: var(--red); }

    .options { margin-top: 16px; display: flex; flex-direction: column; gap: 8px; }
    .options-label { font-size: 0.78rem; color: var(--muted); font-weight: 500; }
    .output-type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .output-type-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; color: var(--muted); padding: 9px 11px; cursor: pointer; font-size: 0.8rem; text-align: left; transition: all 0.15s; }
    .output-type-btn:hover { border-color: var(--accent); color: var(--text); }
    .output-type-btn.active { border-color: var(--accent); background: rgba(108,99,255,0.12); color: var(--text); }
    .output-type-btn .btn-title { font-weight: 600; display: block; margin-bottom: 2px; }
    .output-type-btn .btn-desc { font-size: 0.73rem; opacity: 0.7; }

    .generate-btn { margin-top: 16px; width: 100%; background: var(--accent); color: #fff; border: none; border-radius: 9px; padding: 12px; font-size: 0.92rem; font-weight: 600; cursor: pointer; transition: background 0.2s, opacity 0.2s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .generate-btn:hover:not(:disabled) { background: var(--accent-hover); }
    .generate-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .spinner { width: 15px; height: 15px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg { background: rgba(244,102,106,0.1); border: 1px solid rgba(244,102,106,0.3); border-radius: 9px; padding: 12px 14px; font-size: 0.83rem; color: var(--red); margin-top: 10px; display: none; }

    .output-placeholder { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; color: var(--muted); text-align: center; gap: 10px; }
    .output-placeholder-icon { font-size: 2.2rem; opacity: 0.35; }
    .output-placeholder p { font-size: 0.88rem; max-width: 220px; line-height: 1.5; }

    .output-area { display: none; flex-direction: column; height: 100%; gap: 12px; }
    .output-area.visible { display: flex; }
    .output-header { display: flex; align-items: center; justify-content: space-between; }
    .output-meta { font-size: 0.78rem; color: var(--muted); }
    .copy-btn { background: var(--surface2); border: 1px solid var(--border); color: var(--text); border-radius: 6px; padding: 5px 11px; font-size: 0.78rem; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 5px; }
    .copy-btn:hover { border-color: var(--accent); }
    .copy-btn.copied { border-color: var(--green); color: var(--green); }
    .output-box { flex: 1; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 18px; overflow-y: auto; font-family: 'Fira Code', 'Cascadia Code', 'Menlo', monospace; font-size: 0.81rem; line-height: 1.7; white-space: pre-wrap; word-break: break-word; color: var(--text); }

    @media (max-width: 768px) {
      main { grid-template-columns: 1fr; height: auto; }
      .panel-left { border-right: none; border-bottom: 1px solid var(--border); }
      #proxyInput, #apiKeyInput { width: 150px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">✦</div>
    Screenshot to Spec
  </div>
  <div class="header-controls">
    <label for="providerSelect">Provider</label>
    <select id="providerSelect" class="ctrl-input">
      <option value="claude">Claude (Anthropic)</option>
      <option value="groq">Groq (Llama Vision)</option>
    </select>

    <label for="proxyInput">Proxy URL</label>
    <input type="text" id="proxyInput" class="ctrl-input" placeholder="https://your-worker.workers.dev" autocomplete="off" />

    <label for="apiKeyInput" id="apiKeyLabel">API key</label>
    <input type="password" id="apiKeyInput" class="ctrl-input" placeholder="sk-ant-..." autocomplete="off" />
    <div class="key-status" id="keyStatus"></div>
  </div>
</header>

<main>
  <div class="panel panel-left">
    <div class="panel-title">Upload Screenshot</div>

    <div class="dropzone" id="dropzone">
      <input type="file" id="fileInput" accept="image/*" />
      <div class="dropzone-icon">🖼️</div>
      <div class="dropzone-text">Drop a screenshot here</div>
      <div class="dropzone-sub">or click to browse · PNG, JPG, WebP</div>
    </div>

    <div class="preview-wrap" id="previewWrap" style="display:none">
      <img id="previewImg" src="" alt="Preview" />
      <button class="preview-clear" id="clearBtn" title="Remove">✕</button>
    </div>

    <div class="options">
      <div class="options-label">Output format</div>
      <div class="output-type-grid">
        <button class="output-type-btn active" data-type="tailwind">
          <span class="btn-title">Tailwind HTML</span>
          <span class="btn-desc">HTML + Tailwind classes</span>
        </button>
        <button class="output-type-btn" data-type="spec">
          <span class="btn-title">Component Spec</span>
          <span class="btn-desc">Structure & hierarchy</span>
        </button>
        <button class="output-type-btn" data-type="css">
          <span class="btn-title">Plain CSS</span>
          <span class="btn-desc">Semantic HTML + CSS</span>
        </button>
        <button class="output-type-btn" data-type="react">
          <span class="btn-title">React Component</span>
          <span class="btn-desc">JSX + Tailwind</span>
        </button>
      </div>
    </div>

    <button class="generate-btn" id="generateBtn" disabled>
      <div class="spinner" id="spinner"></div>
      <span id="generateLabel">Generate</span>
    </button>

    <div class="error-msg" id="errorMsg"></div>
  </div>

  <div class="panel panel-right">
    <div class="output-placeholder" id="outputPlaceholder">
      <div class="output-placeholder-icon">✦</div>
      <p>Upload a screenshot and click Generate to get your component spec or code.</p>
    </div>
    <div class="output-area" id="outputArea">
      <div class="output-header">
        <div class="output-meta" id="outputMeta"></div>
        <button class="copy-btn" id="copyBtn"><span>📋</span> Copy</button>
      </div>
      <div class="output-box" id="outputBox"></div>
    </div>
  </div>
</main>

<script>
  const providerSelect = document.getElementById('providerSelect');
  const proxyInput = document.getElementById('proxyInput');
  const apiKeyInput = document.getElementById('apiKeyInput');
  const apiKeyLabel = document.getElementById('apiKeyLabel');
  const keyStatus = document.getElementById('keyStatus');
  const dropzone = document.getElementById('dropzone');
  const fileInput = document.getElementById('fileInput');
  const previewWrap = document.getElementById('previewWrap');
  const previewImg = document.getElementById('previewImg');
  const clearBtn = document.getElementById('clearBtn');
  const generateBtn = document.getElementById('generateBtn');
  const generateLabel = document.getElementById('generateLabel');
  const spinner = document.getElementById('spinner');
  const errorMsg = document.getElementById('errorMsg');
  const outputPlaceholder = document.getElementById('outputPlaceholder');
  const outputArea = document.getElementById('outputArea');
  const outputBox = document.getElementById('outputBox');
  const outputMeta = document.getElementById('outputMeta');
  const copyBtn = document.getElementById('copyBtn');

  let imageData = null;
  let imageMime = null;
  let selectedType = 'tailwind';

  // Restore saved settings
  providerSelect.value = localStorage.getItem('s2s_provider') || 'claude';
  proxyInput.value = localStorage.getItem('s2s_proxy') || '';
  apiKeyInput.value = localStorage.getItem('s2s_key') || '';
  updateProviderUI();
  updateKeyStatus();
  updateGenerateBtn();

  providerSelect.addEventListener('change', () => {
    localStorage.setItem('s2s_provider', providerSelect.value);
    updateProviderUI();
    updateKeyStatus();
    updateGenerateBtn();
  });

  proxyInput.addEventListener('input', () => {
    localStorage.setItem('s2s_proxy', proxyInput.value.trim());
    updateGenerateBtn();
  });

  apiKeyInput.addEventListener('input', () => {
    localStorage.setItem('s2s_key', apiKeyInput.value.trim());
    updateKeyStatus();
    updateGenerateBtn();
  });

  function updateProviderUI() {
    if (providerSelect.value === 'groq') {
      apiKeyLabel.textContent = 'Groq key';
      apiKeyInput.placeholder = 'gsk_...';
    } else {
      apiKeyLabel.textContent = 'API key';
      apiKeyInput.placeholder = 'sk-ant-...';
    }
  }

  function updateKeyStatus() {
    const key = apiKeyInput.value.trim();
    const ok = providerSelect.value === 'groq'
      ? key.startsWith('gsk_')
      : key.startsWith('sk-ant-');
    keyStatus.className = 'key-status' + (ok ? ' ok' : '');
  }

  function updateGenerateBtn() {
    const key = apiKeyInput.value.trim();
    const proxy = proxyInput.value.trim();
    const keyOk = providerSelect.value === 'groq' ? key.startsWith('gsk_') : key.startsWith('sk-ant-');
    generateBtn.disabled = !(imageData && keyOk && proxy.startsWith('https://'));
  }

  // Output type
  document.querySelectorAll('.output-type-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.output-type-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedType = btn.dataset.type;
    });
  });

  // Drag & drop
  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => { e.preventDefault(); dropzone.classList.remove('drag-over'); if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]); });
  fileInput.addEventListener('change', () => { if (fileInput.files[0]) loadFile(fileInput.files[0]); });

  clearBtn.addEventListener('click', () => {
    imageData = null; imageMime = null;
    previewWrap.style.display = 'none';
    previewImg.src = ''; fileInput.value = '';
    updateGenerateBtn();
  });

  function loadFile(file) {
    if (!file.type.startsWith('image/')) { showError('Please upload an image file.'); return; }
    imageMime = file.type;
    const reader = new FileReader();
    reader.onload = e => {
      imageData = e.target.result.split(',')[1];
      previewImg.src = e.target.result;
      previewWrap.style.display = 'block';
      hideError(); updateGenerateBtn();
    };
    reader.readAsDataURL(file);
  }

  // Prompts
  const prompts = {
    tailwind: `Analyze this UI screenshot and produce clean, semantic HTML with Tailwind CSS classes that faithfully recreates the layout and design. Include all visible text content as placeholders. Output only the HTML code block, no explanation.`,
    spec: `Analyze this UI screenshot and provide a detailed component specification including:
1. Component hierarchy and structure
2. Layout type (flex/grid) and spacing patterns
3. Typography styles (sizes, weights, colors)
4. Color palette (hex values where identifiable)
5. Interactive elements and states
6. Responsive considerations
Be precise and developer-ready.`,
    css: `Analyze this UI screenshot and produce semantic HTML5 with a complete plain CSS stylesheet that recreates the layout and design. Use BEM-style class names. Output the HTML first, then the CSS. No Tailwind. No explanation.`,
    react: `Analyze this UI screenshot and produce a React functional component with Tailwind CSS classes that recreates the layout. Use clean JSX, props where sensible, and include placeholder content. Output only the component code, no explanation.`,
  };

  // Generate
  generateBtn.addEventListener('click', async () => {
    const key = apiKeyInput.value.trim();
    const proxy = proxyInput.value.trim().replace(/\/$/, '');
    const provider = providerSelect.value;
    if (!key || !imageData || !proxy) return;

    setLoading(true); hideError();

    try {
      let res;

      if (provider === 'claude') {
        res = await fetch(proxy + '/v1/messages', {
          method: 'POST',
          headers: {
            'x-api-key': key,
            'anthropic-version': '2023-06-01',
            'content-type': 'application/json',
          },
          body: JSON.stringify({
            model: 'claude-3-5-sonnet-20241022',
            max_tokens: 4096,
            messages: [{
              role: 'user',
              content: [
                { type: 'image', source: { type: 'base64', media_type: imageMime, data: imageData } },
                { type: 'text', text: prompts[selectedType] }
              ]
            }]
          })
        });
      } else {
        // Groq — OpenAI-compatible vision API
        res = await fetch(proxy + '/groq/openai/v1/chat/completions', {
          method: 'POST',
          headers: {
            'Authorization': 'Bearer ' + key,
            'content-type': 'application/json',
          },
          body: JSON.stringify({
            model: 'llama-3.2-90b-vision-preview',
            max_tokens: 4096,
            messages: [{
              role: 'user',
              content: [
                { type: 'image_url', image_url: { url: `data:${imageMime};base64,${imageData}` } },
                { type: 'text', text: prompts[selectedType] }
              ]
            }]
          })
        });
      }

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        const msg = err?.error?.message || (provider === 'claude' ? err?.error : null) || `API error ${res.status}`;
        throw new Error(msg);
      }

      const data = await res.json();
      const text = provider === 'claude'
        ? (data.content?.[0]?.text || '')
        : (data.choices?.[0]?.message?.content || '');

      const typeLabels = { tailwind: 'Tailwind HTML', spec: 'Component Spec', css: 'Plain CSS', react: 'React Component' };
      const providerLabel = provider === 'claude' ? 'Claude 3.5 Sonnet' : 'Groq Llama Vision';

      outputBox.textContent = text;
      outputMeta.textContent = `${typeLabels[selectedType]} · ${providerLabel}`;
      outputPlaceholder.style.display = 'none';
      outputArea.classList.add('visible');

    } catch (err) {
      showError(err.message || 'Something went wrong. Check your API key and try again.');
    } finally {
      setLoading(false);
    }
  });

  copyBtn.addEventListener('click', () => {
    navigator.clipboard.writeText(outputBox.textContent).then(() => {
      copyBtn.classList.add('copied');
      copyBtn.innerHTML = '<span>✓</span> Copied!';
      setTimeout(() => { copyBtn.classList.remove('copied'); copyBtn.innerHTML = '<span>📋</span> Copy'; }, 2000);
    });
  });

  function setLoading(on) {
    generateBtn.disabled = on;
    spinner.style.display = on ? 'block' : 'none';
    generateLabel.textContent = on ? 'Generating…' : 'Generate';
  }
  function showError(msg) { errorMsg.textContent = msg; errorMsg.style.display = 'block'; }
  function hideError() { errorMsg.style.display = 'none'; }
</script>
</body>
</html>
